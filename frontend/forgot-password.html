<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forgot Password — North Central Railway</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif;}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    position:relative;
    background:url('loginimage.png') center center/cover no-repeat fixed;
    border:12px solid #2563EB;
}

body::before{
    content:"";
    position:absolute;
    inset:0;
    background:rgba(0,0,0,0.55);
}

.container{
    position:relative;
    z-index:2;
    width:100%;
    max-width:480px;
    padding:40px;
    border-radius:25px;
    background:rgba(255,255,255,0.12);
    backdrop-filter:blur(18px);
    border:1px solid rgba(255,255,255,0.2);
    box-shadow:0 20px 60px rgba(0,0,0,.35);
}

.railway-header{text-align:center;margin-bottom:28px;}
.railway-header h1{color:white;font-size:28px;margin-bottom:8px;}
.railway-header p{color:#ddd;font-size:14px;}
.logo{font-size:50px;margin-bottom:10px;}

.info-text{
    color:#bfdbfe;font-size:13px;text-align:center;
    margin-bottom:22px;line-height:1.6;
}

.role-title{text-align:center;color:white;margin-bottom:12px;font-weight:600;}
.role-selector{display:flex;gap:10px;margin-bottom:22px;}
.role-btn{
    flex:1;border:none;padding:12px;border-radius:12px;
    background:rgba(255,255,255,.15);color:white;
    cursor:pointer;font-weight:600;transition:.3s;
}
.role-btn:hover{transform:translateY(-2px);}
.role-btn.active{background:#2563EB;color:white;}

.form-group{margin-bottom:18px;}
.form-group label{display:block;color:white;margin-bottom:6px;font-weight:600;}
.form-group input{
    width:100%;padding:14px;border:none;border-radius:12px;
    background:rgba(255,255,255,.95);font-size:15px;
}
.form-group input:focus{outline:none;box-shadow:0 0 0 3px rgba(37,99,235,.5);}

.submit-btn{
    width:100%;padding:15px;border:none;border-radius:12px;
    background:linear-gradient(135deg,#1E40AF,#2563EB);
    color:white;font-size:16px;font-weight:700;cursor:pointer;transition:.3s;
}
.submit-btn:hover{transform:translateY(-3px);background:linear-gradient(135deg,#1D4ED8,#3B82F6);}
.submit-btn:disabled{opacity:.6;cursor:not-allowed;transform:none;}

.message{text-align:center;margin-top:15px;font-weight:600;padding:12px 16px;border-radius:10px;}
.message.success{color:#d1fae5;background:rgba(16,185,129,0.2);}
.message.error{color:#fee2e2;background:rgba(239,68,68,0.2);}

.links{text-align:center;margin-top:22px;}
.links a{color:white;text-decoration:none;font-weight:600;}
.links a:hover{text-decoration:underline;}

.footer-note{margin-top:22px;text-align:center;color:#ddd;font-size:12px;}
</style>
</head>
<body>

<div class="container">

    <div class="railway-header">
        <div class="logo">🔒</div>
        <h1>North Central Railway</h1>
        <p>AMC Complaint Management System</p>
    </div>

    <p class="info-text">
        Enter your registered email and select your role.<br>
        We'll send a password reset link to your inbox.
    </p>

    <div class="role-title">I am a</div>
    <div class="role-selector">
        <button type="button" class="role-btn active" data-role="user">User</button>
        <button type="button" class="role-btn" data-role="technician">Technician</button>
        <button type="button" class="role-btn" data-role="admin">Admin</button>
    </div>

    <div class="form-group">
        <label>Registered Email Address</label>
        <input type="email" id="email" placeholder="Enter your registered email" required>
    </div>

    <button class="submit-btn" id="submitBtn" onclick="sendResetLink()">
        Send Reset Link
    </button>

    <div id="message" class="message" style="display:none;"></div>

    <div class="links">
        <a href="login.html">← Back to Login</a>
    </div>

    <div class="footer-note">
        North Central Railway • Authorized Access Only
    </div>

</div>

<script>
const API_BASE_URL = 'http://localhost:5000';
let selectedRole = 'user';

document.querySelectorAll('.role-btn').forEach(btn => {
    btn.addEventListener('click', () => {
        document.querySelectorAll('.role-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        selectedRole = btn.dataset.role;
    });
});

async function sendResetLink() {
    const email = document.getElementById('email').value.trim();
    const btn   = document.getElementById('submitBtn');

    if (!email) {
        showMsg('Please enter your email address.', 'error');
        return;
    }

    btn.disabled    = true;
    btn.textContent = 'Sending…';
    document.getElementById('message').style.display = 'none';

    try {
        const res  = await fetch(`${API_BASE_URL}/api/auth/forgot-password`, {
            method:  'POST',
            headers: {'Content-Type': 'application/json'},
            body:    JSON.stringify({ email, role: selectedRole }),
        });
        const data = await res.json();
        showMsg(data.message || 'Reset link sent! Check your inbox (and spam folder).', res.ok ? 'success' : 'error');
    } catch (err) {
        showMsg('Network error. Please make sure the backend server is running.', 'error');
    } finally {
        btn.disabled    = false;
        btn.textContent = 'Send Reset Link';
    }
}

function showMsg(text, type) {
    const el = document.getElementById('message');
    el.textContent   = text;
    el.className     = `message ${type}`;
    el.style.display = 'block';
}

document.getElementById('email').addEventListener('keydown', e => {
    if (e.key === 'Enter') sendResetLink();
});
</script>
</body>
</html>
