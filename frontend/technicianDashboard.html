<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Technician Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            background: #f5f9ff !important;
            min-height: 100vh;
            color: #1e293b;
        }

        .header {
            width: 100%;
            background: linear-gradient(135deg, #0052cc, #007bff);
            color: white;
            padding: 16px 28px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 12px rgba(0,0,0,.15);
            position: relative;
            z-index: 20;
        }

        .header h1 {
            font-size: 28px;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .edit-profile-btn {
            border: none;
            background: #10b981;
            color: white;
            padding: 10px 18px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
        }

        .edit-profile-btn:hover {
            background: #059669;
        }

        .logout-btn {
            border: none;
            background: white;
            color: #2563eb;
            padding: 10px 18px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
        }

        .logout-btn:hover {
            background: #e0ecff;
        }

        /* Announcement fixed position directly below header */
        .railway-track-container {
            display: none;
            width: 100%;
            background: #1e293b;
            border-bottom: 4px solid #475569;
            overflow: hidden;
            white-space: nowrap;
            padding: 8px 0;
            box-shadow: inset 0 -4px 10px rgba(0,0,0,0.3);
            position: relative;
            z-index: 10;
        }

        .message-train {
            display: inline-flex;
            align-items: center;
            padding-left: 100%;
            animation: trainRunRoute 22s linear infinite;
        }

        .train-engine {
            font-size: 24px;
            margin-right: 8px;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2));
            animation: engineVibration 0.15s linear infinite;
        }

        #trainWagonsWrapper {
            display: inline-flex;
            align-items: center;
            gap: 12px;
        }

        .train-wagon {
            background: #22c55e;
            color: #ffffff;
            font-weight: 700;
            font-size: 14px;
            padding: 7px 16px;
            border-radius: 6px;
            border: 2px solid #15803d;
            border-bottom: 4px solid #166534;
            position: relative;
            margin-right: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.15);
        }

        .train-wagon::after {
            content: '';
            position: absolute;
            right: -14px;
            top: 50%;
            transform: translateY(-50%);
            width: 12px;
            height: 4px;
            background: #475569;
        }

        .train-wagon:last-child::after {
            display: none;
        }

        @keyframes trainRunRoute {
            0% { transform: translate3d(0, 0, 0); }
            100% { transform: translate3d(-100%, 0, 0); }
        }

        @keyframes engineVibration {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-1px); }
        }

        .container {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            padding: 30px;
        }

        .cards {
            display: grid !important;
            grid-template-columns: repeat(4, minmax(180px, 1fr)) !important;
            gap: 20px !important;
            width: 100%;
            margin-bottom: 30px;
        }

        .card {
            background: white;
            border-radius: 18px;
            padding: 25px;
            box-shadow: 0 8px 25px rgba(0,123,255,.12);
            transition: .3s;
            border-left: 6px solid #007bff;
            width: 100%;
            min-height: 120px;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .card h2 {
            font-size: 34px;
            color: #007bff;
            margin-bottom: 10px;
        }

        .card p {
            color: #666;
            font-weight: 600;
        }

        #attendanceStatus {
            margin: 20px 0;
            padding: 15px;
            background: #e8f5e9;
            border-radius: 10px;
            display: none;
            font-weight: bold;
            color: #2e7d32;
        }

        .table-container {
            width: 100%;
            margin-top: 20px;
            background: white;
            border-radius: 18px;
            padding: 20px;
            box-shadow: 0 8px 25px rgba(0,123,255,.12);
        }

        .table-title {
            margin-bottom: 15px;
            color: #0052cc;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            table-layout: fixed;
        }

        th {
            background: #007bff;
            color: white;
            padding: 14px;
            text-align: left;
            font-weight: 600;
        }

        td {
            padding: 14px;
            border-bottom: 1px solid #eee;
            text-align: left;
            vertical-align: middle;
            word-wrap: break-word;
        }

        table th:nth-child(1), table td:nth-child(1) { width: 18%; }
        table th:nth-child(2), table td:nth-child(2) { width: 42%; }
        table th:nth-child(3), table td:nth-child(3) { width: 20%; }
        table th:nth-child(4), table td:nth-child(4) { width: 20%; }

        tr:hover {
            background: #f8fbff;
        }

        .accept-btn {
            background: #007bff;
            color: white;
            border: none;
            padding: 10px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
        }

        .resolve-btn {
            background: #00b894;
            color: white;
            border: none;
            padding: 10px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
        }

        .status-pending { color: #ff9800; font-weight: bold; text-transform: capitalize; }
        .status-assigned { color: #007bff; font-weight: bold; text-transform: capitalize; }
        .status-accepted { color: #f59e0b; font-weight: bold; text-transform: capitalize; }
        .status-resolved { color: #00b894; font-weight: bold; text-transform: capitalize; }
        .status-closed { color: #22c55e; font-weight: bold; text-transform: capitalize; }

        @media (max-width: 900px) {
            .header {
                flex-direction: column;
                gap: 12px;
                text-align: center;
            }

            .header-right {
                flex-wrap: wrap;
                justify-content: center;
            }

            .cards {
                grid-template-columns: repeat(2, 1fr) !important;
            }

            table {
                min-width: 750px;
            }

            .table-container {
                overflow-x: auto;
            }
        }

        @media (max-width: 600px) {
            .cards {
                grid-template-columns: 1fr !important;
            }

            .container {
                padding: 18px;
            }
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>Technician Dashboard</h1>
        <div class="header-right">
            <div id="techName">Welcome Technician</div>
            <button id="editProfileBtn" class="edit-profile-btn">Edit Profile</button>
            <button id="markAttendanceBtn" class="edit-profile-btn">Mark Attendance</button>
            <button id="logoutBtn" class="logout-btn">Logout</button>
        </div>
    </div>

    <!-- Announcement banner: header ke just neeche -->
    <div id="announcementContainer" class="railway-track-container">
        <div class="message-train">
            <span class="train-engine">🚂</span>
            <div id="trainWagonsWrapper">
                <div class="train-wagon">LOADING SYSTEM DATA...</div>
            </div>
        </div>
    </div>

    <div class="container">
        <div class="cards">
            <div class="card"><h2 id="totalAssigned">0</h2><p>Total Assigned</p></div>
            <div class="card"><h2 id="resolvedCount">0</h2><p>Resolved Complaints</p></div>
            <div class="card"><h2 id="pendingCount">0</h2><p>Pending Complaints</p></div>
            <div class="card"><h2 id="closedCount">0</h2><p>Closed Complaints</p></div>
        </div>

        <div id="attendanceStatus"></div>

        <div class="table-container">
            <h2 class="table-title">Assigned Complaints</h2>
            <table>
                <thead>
                    <tr>
                        <th>Ticket ID</th>
                        <th>Complaint</th>
                        <th>Status</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="complaintsTable"></tbody>
            </table>
        </div>
    </div>

    <!-- Profile Modal -->
    <div id="customProfileModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.5); z-index: 9999; justify-content: center; align-items: center;">
        <div style="background-color: white; padding: 24px; border-radius: 8px; width: 400px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); font-family: sans-serif;">
            <h3 style="margin-top: 0; margin-bottom: 16px; color: #1e293b; border-bottom: 2px solid #f1f5f9; padding-bottom: 8px; text-align: left;">My Profile Settings</h3>
            <form id="profileUpdateForm">
                <div style="margin-bottom: 12px; text-align: left;">
                    <label style="display: block; font-size: 13px; font-weight: 600; color: #475569; margin-bottom: 4px;">Full Name</label>
                    <input type="text" id="profName" style="width: 100%; padding: 8px; border: 1px solid #cbd5e1; border-radius: 6px; box-sizing: border-box;" required placeholder="Enter your full name">
                </div>
                <div style="margin-bottom: 12px; text-align: left;">
                    <label style="display: block; font-size: 13px; font-weight: 600; color: #475569; margin-bottom: 4px;">Phone Number</label>
                    <input type="tel" id="profPhone" maxlength="10" inputmode="numeric" style="width: 100%; padding: 8px; border: 1px solid #cbd5e1; border-radius: 6px; box-sizing: border-box;" required placeholder="Enter 10-digit mobile number">
                </div>
                <div style="margin-bottom: 16px; text-align: left;">
                    <label style="display: block; font-size: 13px; font-weight: 600; color: #475569; margin-bottom: 4px;">Email Address <span style="font-weight:400;color:#94a3b8;font-size:11px;">(read-only)</span></label>
                    <input type="email" id="profEmail" style="width: 100%; padding: 8px; border: 1px solid #e2e8f0; border-radius: 6px; box-sizing: border-box; background:#f8fafc; color:#94a3b8; cursor:not-allowed;" readonly disabled>
                </div>
                <div id="profileModalMsg" style="display:none; margin-bottom:10px; padding:8px 12px; border-radius:6px; font-size:13px; font-weight:600; text-align:center;"></div>
                <div style="display: flex; justify-content: flex-end; gap: 8px;">
                    <button type="button" id="profileCancelBtn" style="padding: 8px 14px; background-color: #e2e8f0; border: none; border-radius: 6px; cursor: pointer; font-weight: 500;">Cancel</button>
                    <button type="submit" style="padding: 8px 14px; background-color: #10b981; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: 500;">Save Changes</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Remarks Modal -->
    <div id="customRemarksModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.5); z-index: 9999; justify-content: center; align-items: center;">
        <div style="background-color: white; padding: 24px; border-radius: 8px; width: 400px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); font-family: sans-serif;">
            <h3 id="modalTitle" style="margin-top: 0; margin-bottom: 12px; color: #1e293b; text-align: left;">Enter Remarks</h3>
            <textarea id="modalRemarksInput" rows="4" style="width: 100%; padding: 8px; border: 1px solid #cbd5e1; border-radius: 6px; box-sizing: border-box; resize: none; margin-bottom: 16px;" placeholder="Write details here..."></textarea>
            <div style="display: flex; justify-content: flex-end; gap: 8px;">
                <button id="modalCancelBtn" style="padding: 8px 14px; background-color: #e2e8f0; border: none; border-radius: 6px; cursor: pointer; font-weight: 500;">Cancel</button>
                <button id="modalSubmitBtn" style="padding: 8px 14px; background-color: #2563eb; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: 500;">Submit</button>
            </div>
        </div>
    </div>

    <!-- Attendance Camera Modal -->
    <div id="attendanceModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,.7); justify-content:center; align-items:center; z-index:99999;">
        <div style="background:#fff; padding:20px; border-radius:10px; width:420px; text-align:center;">
            <h2>Mark Attendance</h2>

            <video id="camera" width="350" height="260" autoplay style="border-radius:10px;border:2px solid #007bff;"></video>

            <br><br>

            <canvas id="canvas" width="350" height="260" style="display:none;"></canvas>

            <button id="captureBtn" style="background:#007bff; color:white; padding:10px 20px; border:none; border-radius:8px; cursor:pointer; margin-right:10px;">
                📸 Capture
            </button>

            <button id="closeCamera" style="background:red; color:white; padding:10px 20px; border:none; border-radius:8px; cursor:pointer;">
                Close
            </button>
        </div>
    </div>

    <script src="js/technicianDashboard.js"></script>
</body>
</html>
