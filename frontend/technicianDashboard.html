<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Technician Dashboard</title>
    <style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif}

body{
    min-height:100vh;
    color:#0f172a;
    background:
        linear-gradient(rgba(239,246,255,.72),rgba(239,246,255,.86)),
        url("images/railway-bg.jpg");
    background-size:cover;
    background-position:center;
    background-attachment:fixed;
}

.header{
    background:linear-gradient(135deg,#003ea8,#0066ff,#0ea5e9);
    color:white;
    padding:20px 42px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    box-shadow:0 14px 40px rgba(0,45,120,.35);
    position:sticky;
    top:0;
    z-index:100;
}

.header h1{font-size:31px;font-weight:850}
.header h1::before{content:"🛠️ ";}

.header-right{display:flex;align-items:center;gap:14px;flex-wrap:wrap}
#techName{font-weight:800;background:rgba(255,255,255,.15);padding:10px 16px;border-radius:999px}

.edit-profile-btn,.logout-btn{
    border:none;
    padding:11px 18px;
    border-radius:13px;
    cursor:pointer;
    font-weight:800;
    transition:.25s;
}

.edit-profile-btn{background:linear-gradient(135deg,#10b981,#14b8a6);color:white}
.logout-btn{background:white;color:#1554d1}
.edit-profile-btn:hover,.logout-btn:hover{transform:translateY(-3px)}

.railway-track-container{
    display:none;
    width:100%;
    background:rgba(15,23,42,.88);
    backdrop-filter:blur(8px);
    border-bottom:4px solid #334155;
    overflow:hidden;
    white-space:nowrap;
    padding:12px 0;
}

.message-train{
    display:inline-flex;
    align-items:center;
    padding-left:100%;
    animation:trainRunRoute 24s linear infinite;
}

.train-engine{font-size:31px;margin-right:12px}
#trainWagonsWrapper{display:inline-flex;align-items:center;gap:14px}

.train-wagon{
    background:linear-gradient(135deg,#0f766e,#16a34a);
    color:white;
    font-size:14px;
    font-weight:850;
    padding:10px 20px;
    border-radius:14px;
    box-shadow:0 10px 24px rgba(0,0,0,.28);
}

@keyframes trainRunRoute{
    from{transform:translateX(0)}
    to{transform:translateX(-100%)}
}

.container{
    max-width:1180px;
    margin:0 auto;
    padding:36px 28px;
}

.cards{
    display:grid!important;
    grid-template-columns:repeat(4,minmax(180px,1fr))!important;
    gap:24px!important;
    margin-bottom:34px;
}

.card{
    background:rgba(255,255,255,.92);
    backdrop-filter:blur(16px);
    border-radius:26px;
    padding:30px;
    min-height:140px;
    box-shadow:0 18px 45px rgba(37,99,235,.18);
    border:1px solid rgba(255,255,255,.65);
    transition:.35s;
    position:relative;
    overflow:hidden;
}

.card::before{
    content:"";
    position:absolute;
    width:130px;
    height:130px;
    right:-45px;
    bottom:-45px;
    background:linear-gradient(135deg,rgba(37,99,235,.14),rgba(14,165,233,.05));
    border-radius:50%;
}

.card:hover{
    transform:translateY(-8px);
    box-shadow:0 26px 60px rgba(37,99,235,.28);
}

.card h2{
    font-size:44px;
    color:#0057ff;
    font-weight:900;
    margin-bottom:8px;
}

.card p{
    color:#334155;
    font-size:15px;
    font-weight:800;
}

#attendanceStatus{
    margin:20px 0;
    padding:16px 20px;
    background:rgba(220,252,231,.95);
    border-left:7px solid #16a34a;
    border-radius:18px;
    display:none;
    font-weight:850;
    color:#166534;
}

.table-container{
    background:rgba(255,255,255,.94);
    backdrop-filter:blur(18px);
    border-radius:30px;
    padding:30px;
    box-shadow:0 24px 60px rgba(15,23,42,.18);
    border:1px solid rgba(255,255,255,.75);
    overflow:hidden;
}

.table-title{
    color:#0647b7;
    font-size:26px;
    margin-bottom:20px;
    display:flex;
    align-items:center;
    gap:10px;
}

.table-title::before{content:"📋"}

table{
    width:100%;
    border-collapse:separate;
    border-spacing:0 13px;
    table-layout:fixed;
}

thead th{
    background:linear-gradient(135deg,#0057ff,#0ea5e9);
    color:white;
    padding:17px;
    text-align:left;
    font-size:14px;
}

thead th:first-child{border-radius:16px 0 0 16px}
thead th:last-child{border-radius:0 16px 16px 0}

tbody tr{
    background:rgba(248,251,255,.95);
    box-shadow:0 10px 24px rgba(15,23,42,.08);
    transition:.25s;
}

tbody tr:hover{
    transform:scale(1.012);
    background:white;
}

td{
    padding:19px 17px;
    border-top:1px solid #dbeafe;
    border-bottom:1px solid #dbeafe;
    vertical-align:middle;
    word-wrap:break-word;
}

td:first-child{
    border-left:1px solid #dbeafe;
    border-radius:16px 0 0 16px;
    font-weight:900;
    color:#0754d8;
}

td:last-child{
    border-right:1px solid #dbeafe;
    border-radius:0 16px 16px 0;
}

table th:nth-child(1),table td:nth-child(1){width:18%}
table th:nth-child(2),table td:nth-child(2){width:42%}
table th:nth-child(3),table td:nth-child(3){width:20%}
table th:nth-child(4),table td:nth-child(4){width:20%}

.accept-btn,.resolve-btn{
    border:none;
    color:white;
    padding:11px 20px;
    border-radius:14px;
    cursor:pointer;
    font-weight:850;
    transition:.25s;
}

.accept-btn{background:linear-gradient(135deg,#2563eb,#0ea5e9)}
.resolve-btn{background:linear-gradient(135deg,#10b981,#059669)}
.accept-btn:hover,.resolve-btn:hover{transform:translateY(-3px)}

.status-pending,.status-assigned,.status-accepted,.status-resolved,.status-closed{
    display:inline-block;
    padding:8px 14px;
    border-radius:999px;
    font-weight:850;
    font-size:13px;
}

.status-pending{background:#fef3c7;color:#b45309}
.status-assigned{background:#dbeafe;color:#1d4ed8}
.status-accepted{background:#ede9fe;color:#7c3aed}
.status-resolved{background:#d1fae5;color:#047857}
.status-closed{background:#dcfce7;color:#15803d}

#customProfileModal>div,#customRemarksModal>div,#attendanceModal>div{
    border-radius:24px!important;
    box-shadow:0 30px 80px rgba(0,0,0,.32)!important;
}

input,textarea{outline:none}
input:focus,textarea:focus{
    border-color:#2563eb!important;
    box-shadow:0 0 0 4px rgba(37,99,235,.13);
}

@media(max-width:900px){
    .header{flex-direction:column;gap:14px;text-align:center}
    .header-right{justify-content:center}
    .cards{grid-template-columns:repeat(2,1fr)!important}
    .table-container{overflow-x:auto}
    table{min-width:760px}
}

@media(max-width:600px){
    .container{padding:22px 16px}
    .cards{grid-template-columns:1fr!important}
    .header h1{font-size:24px}
}
body {
    margin: 0;
    padding: 0;
    min-height: 100vh;
    font-family: 'Segoe UI', sans-serif;

    background-image:
       
        url("tech.png");

    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    background-attachment: fixed;
}
</style>
</head>
<body>

    <div class="header">
        <h1>Technician Dashboard</h1>
        <div class="header-right">
            <div id="techName">Welcome Technician</div>
            <button id="editProfileBtn" class="edit-profile-btn">Edit Profile</button>
            <button id="markAttendanceBtn" class="edit-profile-btn">Mark Attendance</button>
            <button id="logoutBtn" class="logout-btn">Logout</button>
        </div>
    </div>

    <!-- Announcement banner: header ke just neeche -->
    <div id="announcementContainer" class="railway-track-container">
        <div class="message-train">
            <span class="train-engine">🚂</span>
            <div id="trainWagonsWrapper">
                <div class="train-wagon">LOADING SYSTEM DATA...</div>
            </div>
        </div>
    </div>

    <div class="container">
        <div class="cards">
            <div class="card"><h2 id="totalAssigned">0</h2><p>Total Assigned</p></div>
            <div class="card"><h2 id="resolvedCount">0</h2><p>Resolved Complaints</p></div>
            <div class="card"><h2 id="pendingCount">0</h2><p>Pending Complaints</p></div>
            <div class="card"><h2 id="closedCount">0</h2><p>Closed Complaints</p></div>
        </div>

        <div id="attendanceStatus"></div>

        <div class="table-container">
            <h2 class="table-title">Assigned Complaints</h2>
            <table>
                <thead>
                    <tr>
                        <th>Ticket ID</th>
                        <th>Complaint</th>
                        <th>Status</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="complaintsTable"></tbody>
            </table>
        </div>
    </div>

    <!-- Profile Modal -->
    <div id="customProfileModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.5); z-index: 9999; justify-content: center; align-items: center;">
        <div style="background-color: white; padding: 24px; border-radius: 8px; width: 400px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); font-family: sans-serif;">
            <h3 style="margin-top: 0; margin-bottom: 16px; color: #1e293b; border-bottom: 2px solid #f1f5f9; padding-bottom: 8px; text-align: left;">My Profile Settings</h3>
            <form id="profileUpdateForm">
                <div style="margin-bottom: 12px; text-align: left;">
                    <label style="display: block; font-size: 13px; font-weight: 600; color: #475569; margin-bottom: 4px;">Full Name</label>
                    <input type="text" id="profName" style="width: 100%; padding: 8px; border: 1px solid #cbd5e1; border-radius: 6px; box-sizing: border-box;" required placeholder="Enter your full name">
                </div>
                <div style="margin-bottom: 12px; text-align: left;">
                    <label style="display: block; font-size: 13px; font-weight: 600; color: #475569; margin-bottom: 4px;">Phone Number</label>
                    <input type="tel" id="profPhone" maxlength="10" inputmode="numeric" style="width: 100%; padding: 8px; border: 1px solid #cbd5e1; border-radius: 6px; box-sizing: border-box;" required placeholder="Enter 10-digit mobile number">
                </div>
                <div style="margin-bottom: 16px; text-align: left;">
                    <label style="display: block; font-size: 13px; font-weight: 600; color: #475569; margin-bottom: 4px;">Email Address <span style="font-weight:400;color:#94a3b8;font-size:11px;">(read-only)</span></label>
                    <input type="email" id="profEmail" style="width: 100%; padding: 8px; border: 1px solid #e2e8f0; border-radius: 6px; box-sizing: border-box; background:#f8fafc; color:#94a3b8; cursor:not-allowed;" readonly disabled>
                </div>
                <div id="profileModalMsg" style="display:none; margin-bottom:10px; padding:8px 12px; border-radius:6px; font-size:13px; font-weight:600; text-align:center;"></div>
                <div style="display: flex; justify-content: flex-end; gap: 8px;">
                    <button type="button" id="profileCancelBtn" style="padding: 8px 14px; background-color: #e2e8f0; border: none; border-radius: 6px; cursor: pointer; font-weight: 500;">Cancel</button>
                    <button type="submit" style="padding: 8px 14px; background-color: #10b981; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: 500;">Save Changes</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Remarks Modal -->
    <div id="customRemarksModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.5); z-index: 9999; justify-content: center; align-items: center;">
        <div style="background-color: white; padding: 24px; border-radius: 8px; width: 400px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); font-family: sans-serif;">
            <h3 id="modalTitle" style="margin-top: 0; margin-bottom: 12px; color: #1e293b; text-align: left;">Enter Remarks</h3>
            <textarea id="modalRemarksInput" rows="4" style="width: 100%; padding: 8px; border: 1px solid #cbd5e1; border-radius: 6px; box-sizing: border-box; resize: none; margin-bottom: 16px;" placeholder="Write details here..."></textarea>
            <div style="display: flex; justify-content: flex-end; gap: 8px;">
                <button id="modalCancelBtn" style="padding: 8px 14px; background-color: #e2e8f0; border: none; border-radius: 6px; cursor: pointer; font-weight: 500;">Cancel</button>
                <button id="modalSubmitBtn" style="padding: 8px 14px; background-color: #2563eb; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: 500;">Submit</button>
            </div>
        </div>
    </div>

    <!-- Attendance Camera Modal -->
    <div id="attendanceModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,.7); justify-content:center; align-items:center; z-index:99999;">
        <div style="background:#fff; padding:20px; border-radius:10px; width:420px; text-align:center;">
            <h2>Mark Attendance</h2>

            <video id="camera" width="350" height="260" autoplay style="border-radius:10px;border:2px solid #007bff;"></video>

            <br><br>

            <canvas id="canvas" width="350" height="260" style="display:none;"></canvas>

            <button id="captureBtn" style="background:#007bff; color:white; padding:10px 20px; border:none; border-radius:8px; cursor:pointer; margin-right:10px;">
                📸 Capture
            </button>

            <button id="closeCamera" style="background:red; color:white; padding:10px 20px; border:none; border-radius:8px; cursor:pointer;">
                Close
            </button>
        </div>
    </div>

    <script src="js/technicianDashboard.js"></script>
</body>
</html>
